<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ARCHETYPE // CANVAS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Basquiat Crown Canvas Background Element -->
    <div class="canvas-grain"></div>

    <!-- Raw Canvas Header -->
    <header id="basquiat-hud">
        <div class="hud-main">
            <div class="identity-block">
                <h1 id="canvas-title">SYSTEM ARCHETYPE</h1>
                <div class="streak-scribble">STREAK: <span id="hud-streak">0</span> DAYS ACTIVE</div>
            </div>
            
            <div class="crown-level-box">
                <div class="basquiat-crown">👑</div>
                <div class="level-badge">LVL <span id="hud-level">1</span></div>
            </div>

            <div class="points-box">
                <div id="hud-points">3</div>
                <div class="points-label">SPARK POINTS</div>
            </div>
        </div>

        <!-- Raw Textured XP Meter -->
        <div class="xp-container-raw">
            <div id="xp-fill-raw"></div>
            <div class="xp-counter-label"><span id="hud-xp-current">0</span> // <span id="hud-xp-needed">500</span> XP</div>
        </div>
    </header>

    <!-- Raw Form Input Console -->
    <section id="input-console-raw">
        <form id="task-form" onsubmit="event.preventDefault(); handleFormSubmit();">
            <input type="text" id="task-desc" placeholder="SCRIBBLE A COMPLETED TASK..." required>
            <select id="task-diff">
                <option value="1">TIER 1 (TRIVIAL)</option>
                <option value="2">TIER 2 (MINOR)</option>
                <option value="3">TIER 3 (MODERATE)</option>
                <option value="4">TIER 4 (DEMANDING)</option>
                <option value="5">TIER 5 (HEROIC)</option>
            </select>
            <button type="submit">COMPILE XP</button>
        </form>
    </section>

    <!-- The Three Tree Columns Grid -->
    <main id="canvas-matrix">
        <!-- Tree 1: The Crucible -->
        <div class="matrix-column" id="col-crucible" style="--accent-color: #e11d48;">
            <div class="column-header-raw">
                <div class="tree-glyph">⎋</div>
                <h2>THE CRUCIBLE</h2>
                <p class="sub-label">SYSTEMS & IMPACT</p>
            </div>
            <div class="tiers-container-raw" id="nodes-crucible"></div>
        </div>

        <!-- Tree 2: The Weave -->
        <div class="matrix-column" id="col-weave" style="--accent-color: #eab308;">
            <div class="column-header-raw">
                <div class="tree-glyph">⌥</div>
                <h2>THE WEAVE</h2>
                <p class="sub-label">WRITING & NARRATIVE</p>
            </div>
            <div class="tiers-container-raw" id="nodes-weave"></div>
        </div>

        <!-- Tree 3: The Wild Card -->
        <div class="matrix-column" id="col-wildcard" style="--accent-color: #2563eb;">
            <div class="column-header-raw">
                <div class="tree-glyph">◇</div>
                <h2>THE WILD CARD</h2>
                <p class="sub-label">CATALYSTS & PERSONAL</p>
            </div>
            <div class="tiers-container-raw" id="nodes-wildcard"></div>
        </div>
    </main>

    <!-- Footer Command Terminal with Reset Skull -->
    <footer id="canvas-footer">
        <button id="nuke-system-btn" onclick="triggerSystemReset()">
            <span class="skull-glyph">💀</span> RESET WEBSITE? (DESTRUCTION REQUIRES CONFIRMATION)
        </button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
