<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODYSSEY // SKILL ARCHETYPE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Cinematic Background Ambient Layers -->
    <div class="bg-overlay"></div>
    <div class="dust-particles"></div>

    <!-- Premium Epic HUD -->
    <header id="odyssey-hud">
        <div class="hud-container">
            <!-- Left Side: User Persona & Level Badge -->
            <div class="hud-left">
                <div class="level-shield">
                    <span class="shield-laurel">❖</span>
                    <span id="hud-level">1</span>
                </div>
                <div class="identity-details">
                    <h1 id="canvas-title">GAME DESIGNER & EDUCATOR</h1>
                    <div class="archetype-label">SYSTEM ARCHETYPE // LEVEL PROGRESS</div>
                </div>
            </div>
            
            <!-- Right Side: Ability Points Available -->
            <div class="hud-right">
                <div class="points-counter-container">
                    <div class="points-label">ABILITY POINTS AVAILABLE</div>
                    <div id="hud-points" class="points-glow">8</div>
                </div>
            </div>
        </div>

        <!-- Sleek Geometric Experience Bar -->
        <div class="xp-bar-wrapper">
            <div class="xp-track">
                <div id="xp-fill"></div>
                <div class="xp-markers">
                    <span></span><span></span><span></span><span></span>
                </div>
            </div>
            <div class="xp-text-display">
                <span id="hud-xp-current">0</span> / <span id="hud-xp-needed">500</span> XP // <span class="streak-highlight">STREAK: <span id="hud-streak">0</span> DAYS</span>
            </div>
        </div>
    </header>

    <!-- Sleek Minimalist Quest Logger (Input Console) -->
    <section id="quest-logger-console">
        <form id="task-form" onsubmit="event.preventDefault(); handleFormSubmit();">
            <div class="input-container-sleek">
                <input type="text" id="task-desc" placeholder="RECORD A COMPLETED ODYSSEY CONTRACT..." required>
                <div class="input-accent-line"></div>
            </div>
            <div class="select-container-sleek">
                <select id="task-diff">
                    <option value="1">TIER I [TRIVIAL BOUNTY]</option>
                    <option value="2">TIER II [MINOR ENCOUNTER]</option>
                    <option value="3">TIER III [CHOSEN QUEST]</option>
                    <option value="4">TIER IV [HEROIC CONFLICT]</option>
                    <option value="5">TIER V [LEGENDARY CONQUEST]</option>
                </select>
            </div>
            <button type="submit" class="odyssey-btn-gold">ENGRAVE + RECORD</button>
        </form>
    </section>

    <!-- Mythic Three-Tiered Skill Tree Matrix -->
    <main id="canvas-matrix">
        
        <!-- Pillar 1: The Crucible (The Hunter / Systems & Hope) -->
        <div class="matrix-column pillar-card" id="col-crucible" style="--pillar-gold: #ffcc00; --pillar-glow: rgba(255, 204, 0, 0.15);">
            <div class="pillar-header">
                <div class="pillar-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2zm0 3.99L19.53 19H4.47L12 5.99zM13 13h-2v-4h2v4zm0 4h-2v-2h2v2z"/></svg>
                </div>
                <h2>THE CRUCIBLE</h2>
                <div class="pillar-sub">SYSTEMS & RADICAL HOPE</div>
            </div>
            <div class="tiers-container-raw" id="nodes-crucible"></div>
        </div>

        <!-- Pillar 2: The Weave (The Assassin / Creative & Textures) -->
        <div class="matrix-column pillar-card" id="col-weave" style="--pillar-gold: #e5c158; --pillar-glow: rgba(229, 193, 88, 0.15);">
            <div class="pillar-header">
                <div class="pillar-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L12 15v5c0 .35.19.67.5.84.16.09.33.16.5.09zm5.79-11.36c.13.58.21 1.17.21 1.79 0 4.08-3.05 7.44-7 7.93v-2.06l4.79-4.79c.39-.39.39-1.02 0-1.41l-2.03-2.03c-.39-.39-1.02-.39-1.41 0L12 10.12V4.07c3.95.49 7 3.85 7 7.93 0 .62-.08 1.21-.21 1.79z"/></svg>
                </div>
                <h2>THE WEAVE</h2>
                <div class="pillar-sub">WRITING & DIALECTICS</div>
            </div>
            <div class="tiers-container-raw" id="nodes-weave"></div>
        </div>

        <!-- Pillar 3: The Wild Card (The Warrior / Catalyst & Sound) -->
        <div class="matrix-column pillar-card" id="col-wildcard" style="--pillar-gold: #c5a059; --pillar-glow: rgba(197, 160, 89, 0.15);">
            <div class="pillar-header">
                <div class="pillar-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 22C6.48 22 2 17.52 2 12S6.48 2 12 2s10 4.48 10 10-4.48 10-10 10zm-1-17.93c-3.95.49-7 3.85-7 7.93 0 .62.08 1.21.21 1.79L9 11v-1c0-1.1.9-2 2-2h1V4.07zm7.79 11.36c.13-.58.21-1.17.21-1.79 0-4.08-3.05-7.44-7-7.93v3.66l-2.24 2.24c-.2.2-.29.47-.24.75l.5 2.5c.08.37.4.63.78.63h1.43v2.06c3.95-.49 7-3.85 7-7.93z"/></svg>
                </div>
                <h2>THE WILD CARD</h2>
                <div class="pillar-sub">CATALYSTS & SOUND</div>
            </div>
            <div class="tiers-container-raw" id="nodes-wildcard"></div>
        </div>

main>

    <!-- Clean Premium Reset Footer -->
    <footer id="canvas-footer">
        <button id="nuke-system-btn" onclick="triggerSystemReset()">
            RESET ALL ABILITIES
        </button>
        <div class="footer-fineprint">© 431 BCE // ARCHETYPE DEVELOPMENT MATRIX</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
